# Pricing rates in USD per 1M tokens.
# GitHub Models documents the token-unit pattern: input, cached input, and output
# tokens receive separate multipliers before billing. The GPT-5.5 row uses the
# supplied Copilot pricing cards.

[models."gpt-5.5"]
input = 5.0
output = 30.0
cache_read = 0.50
cache_creation = 5.0

[models."gpt-5.4-mini"]
input = 0.75
output = 4.50
cache_read = 0.075
cache_creation = 0.75

[models.auto]
input = 5.0
output = 30.0
cache_read = 0.50
cache_creation = 5.0
